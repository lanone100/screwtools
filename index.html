<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>螺絲規格計算器 | Công cụ tính toán kích thước vít</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #64748b;
            --accent-color: #10b981;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
        }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 500px;
        }

        .lang-switch {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-bottom: 10px;
        }

        .lang-btn {
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid var(--primary-color);
            background: transparent;
            cursor: pointer;
            font-size: 13px;
            transition: 0.3s;
        }

        .lang-btn.active {
            background: var(--primary-color);
            color: white;
        }

        .card {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 8px 0;
            color: var(--primary-color);
        }

        .formula-box {
            background: #eff6ff;
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 20px;
            border-left: 4px solid var(--primary-color);
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.95rem;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px; /* 防止iOS縮放 */
            outline: none;
            transition: border 0.2s;
        }

        select:focus {
            border-color: var(--primary-color);
        }

        button.calc-btn {
            width: 100%;
            padding: 14px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.3);
        }

        button.calc-btn:active {
            transform: scale(0.98);
        }

        .result-area {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px dashed #cbd5e1;
            display: none;
        }

        .result-val {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-color);
            text-align: center;
            margin: 10px 0;
        }

        .footer-note {
            font-size: 0.8rem;
            color: var(--secondary-color);
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLang('zh')">繁體中文</button>
            <button class="lang-btn" onclick="setLang('vi')">Tiếng Việt</button>
        </div>
        <h1 id="title">螺絲攻牙孔徑計算器</h1>
    </div>

    <div class="card">
        <div class="formula-box">
            <strong id="label-formula">計算公式：</strong><br>
            <span id="formula-text">孔徑 (D) = 公稱直徑 (d) - 螺距 (P) × 0.75</span>
        </div>

        <div class="input-group">
            <label id="label-diameter">螺絲規格 (M)</label>
            <select id="diameter" onchange="updatePitch()">
                <option value="3">M3</option>
                <option value="4">M4</option>
                <option value="5">M5</option>
                <option value="6">M6</option>
                <option value="8">M8</option>
                <option value="10">M10</option>
                <option value="12">M12</option>
            </select>
        </div>

        <div class="input-group">
            <label id="label-pitch">螺距 Pitch (mm)</label>
            <input type="number" id="pitch" step="0.01" value="0.5">
        </div>

        <div class="input-group">
            <label id="label-depth">螺紋深度百分比</label>
            <select id="percentage">
                <option value="0.75">75% (標準/Tiêu chuẩn)</option>
                <option value="0.85">85% (緊密/Chặt)</option>
                <option value="0.65">65% (寬鬆/Lỏng)</option>
            </select>
        </div>

        <button class="calc-btn" onclick="calculate()" id="btn-calc">立即計算</button>

        <div class="result-area" id="result-area">
            <div style="text-align: center; font-weight: 600;" id="label-result-title">建議鑽孔直徑</div>
            <div class="result-val" id="result-display">2.50 mm</div>
            <p class="footer-note" id="result-note">此為理論參考值，實際加工請依材質調整。</p>
        </div>
    </div>

    <script>
        const i18n = {
            zh: {
                title: "螺絲攻牙孔徑計算器",
                formula: "計算公式：",
                formulaText: "孔徑 (D) = 公稱直徑 (d) - 螺距 (P) × 深度%",
                diameter: "螺絲規格 (M)",
                pitch: "螺距 Pitch (mm)",
                depth: "螺紋深度百分比",
                btn: "立即計算",
                resTitle: "建議鑽孔直徑",
                note: "此為理論參考值，實際加工請依材質調整。"
            },
            vi: {
                title: "Máy tính đường kính lỗ taro",
                formula: "Công thức tính:",
                formulaText: "Đường kính (D) = Đường kính vít (d) - Bước ren (P) × %",
                diameter: "Quy cách vít (M)",
                pitch: "Bước ren Pitch (mm)",
                depth: "Tỷ lệ độ sâu ren",
                btn: "Tính toán ngay",
                resTitle: "Đường kính mũi khoan đề nghị",
                note: "Đây là giá trị tham khảo lý thuyết, hãy điều chỉnh theo vật liệu thực tế."
            }
        };

        const pitchData = {
            "3": 0.5, "4": 0.7, "5": 0.8, "6": 1.0, "8": 1.25, "10": 1.5, "12": 1.75
        };

        function setLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('title').innerText = i18n[lang].title;
            document.getElementById('label-formula').innerText = i18n[lang].formula;
            document.getElementById('formula-text').innerText = i18n[lang].formulaText;
            document.getElementById('label-diameter').innerText = i18n[lang].diameter;
            document.getElementById('label-pitch').innerText = i18n[lang].pitch;
            document.getElementById('label-depth').innerText = i18n[lang].depth;
            document.getElementById('btn-calc').innerText = i18n[lang].btn;
            document.getElementById('label-result-title').innerText = i18n[lang].resTitle;
            document.getElementById('result-note').innerText = i18n[lang].note;
        }

        function updatePitch() {
            const d = document.getElementById('diameter').value;
            document.getElementById('pitch').value = pitchData[d] || 0.5;
        }

        function calculate() {
            const d = parseFloat(document.getElementById('diameter').value);
            const p = parseFloat(document.getElementById('pitch').value);
            const pct = parseFloat(document.getElementById('percentage').value);
            
            if (isNaN(p) || p <= 0) return;

            const result = d - (p * pct);
            
            document.getElementById('result-display').innerText = result.toFixed(2) + " mm";
            document.getElementById('result-area').style.display = 'block';
        }
    </script>
</body>
</html>
